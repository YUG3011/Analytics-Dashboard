version: '3.9'

services:

  # ─────────────────────── MongoDB ───────────────────────
  mongodb:
    image: mongo:6.0
    container_name: causalfunnel_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - causalfunnel_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ─────────────────────── Backend ───────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: causalfunnel_backend
    ports:
      - "5500:5000"          # host:5500 → container:5000
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/causalfunnel
      - NODE_ENV=production
    volumes:
      - ./tracker:/tracker   # Serve tracker.js and demo.html from backend
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - causalfunnel_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─────────────────────── Frontend ──────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: causalfunnel_frontend
    ports:
      - "3000:80"            # host:3000 → Nginx:80
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - causalfunnel_net
    restart: unless-stopped

# ─────────────────────── Networks ──────────────────────
networks:
  causalfunnel_net:
    driver: bridge

# ─────────────────────── Volumes ───────────────────────
volumes:
  mongodb_data:
    driver: local
